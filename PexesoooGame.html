<!DOCTYPE html>
<!-- Source: https://github.com/KarlM0/Pexesooo/ -->
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- SECURITY: CSP restricts script sources to inline only (required for self-contained file),
     images to data: and blob: URIs only, fonts to Google Fonts, no other network. -->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src data: blob:; connect-src 'none';">
<title>Pexesooo</title>

<!-- DESIGN.md Part 1 — fonts from Google Fonts (per doc). Offline: system fallback accepted. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ===== DESIGN.md Part 1 — Universal foundations (verbatim) ===== */
:root {
  --bg:#141518; --surface:#1c1d22; --surface-2:#24252c; --border:#2e2f38;
  --border-soft:#26272f; --text:#e9e9ec; --text-dim:#9a9aa6; --text-faint:#62636e;
  --accent:#7cdcc4; --accent-deep:#152823; --ok:#6fd089; --bad:#e8736f;
  --track:#34353f; --radius:14px; --radius-sm:9px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text);
  font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; }

/* Game uses a wider container than the 760px settings cap (app-specific, per doc). */
.wrap { max-width:920px; margin:0 auto; padding:34px 20px 80px; }
.header { display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:30px; }
h1 { font-family:'Fraunces',serif; font-weight:600; font-size:30px; letter-spacing:-0.01em; line-height:1.1; }
.subtitle { font-size:13.5px; color:var(--text-dim); margin-top:4px; }
.version { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.03em; color:var(--text-faint); margin-top:6px; }
/* DERIVED — repo link; sits below version string, same typographic level. FLAG: candidate for DESIGN.md. */
.repo-link { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.03em; margin-top:4px; }
.repo-link a { color:var(--text-faint); text-decoration:none; transition:color 0.16s; }
.repo-link a:hover { color:var(--accent); }
.header-right { flex-shrink:0; }

.pillgroup { display:inline-flex; background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:3px; }
.pillgroup button { background:transparent; color:var(--text-dim); font-family:'Manrope'; font-weight:600;
  font-size:12px; letter-spacing:0.03em; padding:5px 11px; border-radius:999px; border:none; cursor:pointer; transition:0.18s; }
.pillgroup button.active { background:var(--accent); color:#0e1714; }

/* Cards + collapsible (Part 2) */
.card { background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius); padding:22px; margin-bottom:18px; }
.chead { display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; margin-bottom:20px; }
.card.collapsed .chead { margin-bottom:0; }
.card.collapsed .cbody { display:none; }
.section-title { font-family:'Manrope'; font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint); }
.chev { color:var(--text-dim); transition:transform 0.2s ease; }
.card.collapsed .chev { transform:rotate(-90deg); }

/* Form controls (Part 2) */
.field { margin-bottom:16px; }
.label { display:block; font-family:'Manrope'; font-weight:600; font-size:12.5px; color:var(--text-dim); margin-bottom:7px; }
input[type=text], input[type=number] { background:var(--surface-2); border:1px solid var(--border); color:var(--text);
  font-size:14px; padding:9px 11px; border-radius:var(--radius-sm); transition:0.16s; }
input[type=text] { width:100%; font-family:'Manrope'; }
input[type=number] { font-family:'JetBrains Mono',monospace; width:90px; }
input:focus { outline:none; border-color:var(--accent); }
input:disabled { opacity:0.4; cursor:not-allowed; }

.btn { width:100%; border-radius:var(--radius-sm); font-family:'Manrope'; font-weight:700; font-size:14.5px;
  padding:14px; letter-spacing:0.01em; transition:0.16s; border:none; cursor:pointer; }
.btn-primary { background:var(--accent); color:#0e1714; }
.btn-primary:hover { filter:brightness(1.08); }
.btn-ghost { background:var(--surface-2); border:1px solid var(--border); color:var(--text); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
.btn:disabled { opacity:0.35; cursor:not-allowed; filter:none; }
.btn-row { display:flex; gap:12px; }

/* Toggle switches (Part 2) */
.switch-row { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border-soft); padding:11px 0; gap:14px; }
.switch-row:first-of-type { border-top:none; }
.switch-label { font-family:'Manrope'; font-weight:600; font-size:13.5px; }
.switch-desc { font-family:'Manrope'; font-size:11.5px; color:var(--text-faint); }
.toggle { position:relative; width:42px; height:24px; flex-shrink:0; background:var(--surface-2); border:1px solid var(--border); border-radius:999px; cursor:pointer; transition:0.18s; }
.toggle .knob { position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:var(--text-faint); transition:0.18s; }
.toggle.on { background:var(--accent-deep); border-color:var(--accent); }
.toggle.on .knob { transform:translateX(18px); background:var(--accent); }

/* Selection chips (Part 2) */
.chips { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
.chip { background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:12px 6px;
  display:flex; flex-direction:column; align-items:center; transition:0.16s; cursor:pointer; user-select:none; }
.chip .sym { font-family:'JetBrains Mono',monospace; font-size:24px; color:var(--text-dim); }
.chip.active { border-color:var(--accent); background:var(--accent-deep); }
.chip.active .sym { color:var(--accent); }

/* DERIVED — file/folder picker pair (FLAG: candidate for DESIGN.md). */
.picker-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.picker { display:block; border:1.5px dashed var(--border); background:var(--surface-2); border-radius:var(--radius-sm);
  padding:18px; text-align:center; cursor:pointer; transition:0.16s; }
.picker:hover, .picker.drag { border-color:var(--accent); }
.picker.loaded { border-style:solid; border-color:var(--accent); }
.picker .emoji { font-size:22px; display:block; margin-bottom:6px; }
.picker .ptitle { font-weight:600; font-size:13.5px; }
.picker .pmeta { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint); margin-top:5px; }
.picker input[type=file] { display:none; }

/* Set preview — single selected set (details left, card back right) */
.preview { display:flex; gap:16px; align-items:flex-start; background:var(--surface-2); border:1px solid var(--border-soft);
  border-radius:var(--radius-sm); padding:14px; margin-top:14px; }
.preview-main { flex:1; min-width:0; }
.preview .pname { font-family:'Fraunces',serif; font-weight:600; font-size:18px; }
.preview .pdesc { font-size:13px; color:var(--text-dim); margin-top:3px; }
.preview .pcount { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint); margin-top:6px; }
.preview .pdate { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint); margin-top:2px; }
.samples { display:flex; gap:14px; margin-top:12px; flex-wrap:wrap; }
.sample-pair { display:flex; gap:6px; align-items:center; background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-sm); padding:6px; }
.mini { width:42px; height:42px; border-radius:6px; object-fit:cover; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:9px; text-align:center; padding:3px; color:var(--text-dim); overflow:hidden; line-height:1.1; }
.preview-back { flex-shrink:0; text-align:center; }
.preview-back img { width:120px; height:120px; border-radius:var(--radius-sm); object-fit:cover; border:1px solid var(--border); display:block; }
.preview-back .cap { font-family:'Manrope'; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); margin-top:6px; }

/* DERIVED — folder set list: stack of selectable preview rows (FLAG: candidate for DESIGN.md).
   Each row reuses .preview layout; selected state mirrors chip active pattern (accent border + deep bg). */
.set-list { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
.set-list .preview { margin-top:0; cursor:pointer; border:1.5px solid var(--border); transition:border-color 0.16s, background 0.16s; }
.set-list .preview:hover { border-color:var(--accent); }
.set-list .preview.selected { border-color:var(--accent); background:var(--accent-deep); }
/* Folder list: back thumbnail at 50% of the standard 120px = 60px; no caption. */
.set-list .preview-back img { width:60px; height:60px; }

.error-banner { background:rgba(232,115,111,0.08); border:1px solid var(--bad); color:var(--bad); border-radius:var(--radius-sm); padding:11px 13px; font-size:13px; margin-top:14px; }
/* DERIVED — loading state indicator, derived from section-title typography (FLAG: candidate for DESIGN.md). */
.loading-msg { font-family:'Manrope'; font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-faint); margin-top:14px; text-align:center; padding:18px 0; }

.names-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }

/* DERIVED — player tokens / turn strip (active = filled accent). FLAG: candidate. */
.players { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px; }
.ptoken { display:flex; align-items:center; gap:9px; background:var(--surface-2); border:1px solid var(--border); border-radius:999px; padding:7px 14px; transition:0.18s; }
.ptoken.active { background:var(--accent); border-color:var(--accent); color:#0e1714; }
.ptoken.active.endable { cursor:pointer; box-shadow:0 0 0 3px var(--accent-deep); }
.ptoken .pn { font-family:'Manrope'; font-weight:700; font-size:13.5px; }
.ptoken .ps { font-family:'JetBrains Mono',monospace; font-size:12px; opacity:0.85; }
.ptoken .end-hint { font-family:'Manrope'; font-weight:600; font-size:11px; }

/* Timer — Progress bar (Part 2); fill uses --accent (stated derivation). */
.timer-wrap { margin-bottom:18px; }
.timer-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.timer-label { font-family:'Manrope'; font-weight:700; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); }
.timer-num { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-dim); }
.track { height:9px; border-radius:999px; background:var(--track); overflow:hidden; }
.track .fill { height:100%; background:var(--accent); width:100%; transition:width 0.2s linear; }
.track .fill.low { background:var(--bad); }

/* DERIVED — card + board. Flip = deliberate motion exception (FLAG: candidate). */
.board { display:grid; gap:10px; }
.slot { aspect-ratio:1/1; perspective:700px; }
.slot.won { visibility:hidden; }
.card3d { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform 0.3s ease; cursor:pointer; }
.card3d.up { transform:rotateY(180deg); }
.card-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.face-back { background:var(--surface-2); border:1px solid var(--border); }
.face-back img { width:100%; height:100%; object-fit:cover; }
.face-back .backname { padding:6px; text-align:center; font-family:'Fraunces',serif; font-weight:600; font-size:13px; line-height:1.15; color:var(--text-dim); word-break:break-word; }
.face-front { background:var(--surface); border:1px solid var(--border); transform:rotateY(180deg); }
.face-front img { width:100%; height:100%; object-fit:cover; }
.face-front .txt { padding:6px; text-align:center; font-family:'Manrope'; font-weight:600; font-size:13px; line-height:1.2; word-break:break-word; color:var(--text); }
.card3d.matched .face-front { border-color:var(--ok); box-shadow:0 0 0 2px var(--ok) inset; }
.card3d.nomatch .face-front { border-color:var(--bad); box-shadow:0 0 0 2px var(--bad) inset; }
.board.locked .card3d:not(.up) { pointer-events:none; }

/* Results */
.result-line { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border-soft); padding:12px 0; }
.result-line:first-child { border-top:none; }
.rname { font-family:'Manrope'; font-weight:700; font-size:15px; }
.rname .crown { margin-right:6px; }
.rmeta { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint); margin-top:2px; }
.rscore { font-family:'Fraunces',serif; font-weight:600; font-size:34px; }
.bigtime { font-family:'Fraunces',serif; font-weight:600; font-size:34px; }
.time-row { display:flex; align-items:baseline; gap:10px; margin-bottom:16px; }
.time-row .tl { font-family:'Manrope'; font-weight:700; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); }
.won-cards { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; margin-bottom:6px; }
.won-pair { display:flex; gap:4px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:6px; padding:4px; }

/* DERIVED — pair preview grid. Enlarged version of the won-pair display: each pair's two cards
   sit side by side on a uniting surface, with the pair's file name below. FLAG: candidate. */
.preview-pairs { display:flex; flex-wrap:wrap; gap:16px; }
.preview-pair-item { display:flex; flex-direction:column; align-items:center; gap:7px; }
.preview-pair { display:flex; gap:6px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:var(--radius-sm); padding:8px; }
.preview-pair img { width:96px; height:96px; border-radius:6px; object-fit:cover; background:var(--surface); display:block; }
.preview-pair-label { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); text-align:center; max-width:210px; word-break:break-word; line-height:1.25; }

@keyframes rise { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:none; } }
.rise { animation:rise 0.35s ease backwards; }
.hidden { display:none !important; }

@media (max-width:560px) {
  h1 { font-size:25px; }
  .names-grid { grid-template-columns:1fr; }
  .picker-row { grid-template-columns:1fr; }
  .preview { flex-direction:column; }
  .preview-back img { width:96px; height:96px; }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1 id="t-title">Pexesooo</h1>
      <div class="subtitle" id="t-subtitle">A memory game for 1–6 players.</div>
      <div class="version">Pexesooo v1.7.0</div>
      <div class="repo-link"><a href="https://github.com/KarlM0/Pexesooo/" target="_blank" rel="noopener" id="t-repo">View on GitHub</a></div>
    </div>
    <div class="header-right">
      <div class="pillgroup" id="lang">
        <button data-lang="en">EN</button>
        <button data-lang="cs" class="active">CS</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="card" id="settingsCard">
    <div class="chead" data-toggle="settingsCard">
      <div class="section-title" id="t-settings">Settings</div>
      <svg class="chev" viewBox="0 0 16 16" width="15" height="15"><path d="M4 6 L8 10 L12 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cbody">
      <div class="field">
        <label class="label" id="t-setlabel">Card set</label>
        <!-- Dual picker: file on left, folder on right -->
        <div class="picker-row">
          <label class="picker" id="pickerFile">
            <span class="emoji">🗂️</span>
            <span class="ptitle" id="t-pick">Choose a set file (.json)</span>
            <span class="pmeta" id="pmetaFile">—</span>
            <input type="file" id="fileIn" accept="application/json,.json">
          </label>
          <label class="picker" id="pickerFolder">
            <span class="emoji">📁</span>
            <span class="ptitle" id="t-pickfolder">Choose a folder</span>
            <span class="pmeta" id="pmetaFolder">—</span>
            <input type="file" id="folderIn" webkitdirectory directory multiple>
          </label>
        </div>
        <div id="previewHost"></div>
      </div>

      <div class="field">
        <label class="label" id="t-players">Players</label>
        <div class="chips" id="chips"></div>
      </div>

      <div class="field">
        <label class="label" id="t-names">Names</label>
        <div class="names-grid" id="namesGrid"></div>
      </div>

      <div class="switch-row">
        <div><div class="switch-label" id="t-timer">Turn timer</div><div class="switch-desc" id="t-timer-d">Limit each turn; on timeout the turn passes on.</div></div>
        <div class="toggle" id="timerToggle"><div class="knob"></div></div>
      </div>
      <div class="field hidden" id="timerSecField" style="margin-top:12px">
        <label class="label" id="t-secs">Seconds per turn</label>
        <input type="number" id="timerSecs" min="3" max="120" value="15">
      </div>
      <div class="switch-row">
        <div><div class="switch-label" id="t-livescore">Show score during play</div><div class="switch-desc" id="t-livescore-d">Off: scores are revealed only in the results.</div></div>
        <div class="toggle" id="scoreToggle"><div class="knob"></div></div>
      </div>

      <div class="btn-row" style="margin-top:18px">
        <button class="btn btn-ghost" id="previewBtn" disabled><span id="t-preview">Preview</span></button>
        <button class="btn btn-primary" id="startBtn" disabled><span id="t-start">Start game</span></button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div class="card collapsed" id="gameCard">
    <div class="chead" data-toggle="gameCard">
      <div class="section-title" id="t-game">Game</div>
      <svg class="chev" viewBox="0 0 16 16" width="15" height="15"><path d="M4 6 L8 10 L12 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cbody">
      <div class="players" id="players"></div>
      <div class="timer-wrap hidden" id="timerWrap">
        <div class="timer-top"><span class="timer-label" id="t-timeleft">Time left</span><span class="timer-num" id="timerNum">0s</span></div>
        <div class="track"><div class="fill" id="timerFill"></div></div>
      </div>
      <div class="preview-pairs hidden" id="previewPairs"></div>
      <div class="board" id="board"></div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="card collapsed" id="resultCard">
    <div class="chead" data-toggle="resultCard">
      <div class="section-title" id="t-results">Results</div>
      <svg class="chev" viewBox="0 0 16 16" width="15" height="15"><path d="M4 6 L8 10 L12 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cbody">
      <div class="time-row"><span class="tl" id="t-totaltime">Total time</span><span class="bigtime" id="resTime">0:00</span></div>
      <div id="resultLines"></div>
      <div class="btn-row" style="margin-top:18px">
        <button class="btn btn-ghost" id="againBtn"><span id="t-again">Different game</span></button>
        <button class="btn btn-primary" id="replayBtn"><span id="t-replay">Play again</span></button>
      </div>
    </div>
  </div>

</div>

<script>
"use strict";

/* ---------------- i18n ---------------- */
const STR = {
  en: { title:"Pexesooo", subtitle:"A memory game for 1–6 players.",
    settings:"Settings", setlabel:"Card set",
    pick:"Choose a set file (.json)", pickFolder:"Choose a folder",
    noFile:"—", noFolder:"—",
    players:"Players", names:"Names", player:"Player", timer:"Turn timer",
    timerD:"Limit each turn; on timeout the turn passes on.", secs:"Seconds per turn",
    liveScore:"Show score during play", liveScoreD:"Off: scores are revealed only in the results.",
    start:"Start game", game:"Game", results:"Results", totalTime:"Total time", again:"Different game", replay:"Play again",
    pairs:"pairs", endTurn:"tap to end turn", timeLeft:"Time left", back:"Card back", turns:"Turns",
    preview:"Preview",
    badFile:"That file isn't a valid Pexesooo set.",
    badFolder:"No valid Pexesooo sets found in that folder.",
    loadingFolder:"Reading folder…",
    repo:"View on GitHub" },
  cs: { title:"Pexesooo", subtitle:"Pexeso pro 1–6 hráčů.",
    settings:"Nastavení", setlabel:"Sada karet",
    pick:"Vyberte soubor sady (.json)", pickFolder:"Vyberte složku",
    noFile:"—", noFolder:"—",
    players:"Hráči", names:"Jména", player:"Hráč", timer:"Časomíra na tah",
    timerD:"Omezí každý tah; po vypršení se tah předá dál.", secs:"Sekund na tah",
    liveScore:"Zobrazovat skóre během hry", liveScoreD:"Vypnuto: skóre se ukáže až ve výsledcích.",
    start:"Spustit hru", game:"Hra", results:"Výsledky", totalTime:"Celkový čas", again:"Jiná hra", replay:"Hrát znovu",
    pairs:"dvojic", endTurn:"klepnutím ukončíte tah", timeLeft:"Zbývá", back:"Rub karet", turns:"Tahy",
    preview:"Náhled",
    badFile:"Tento soubor není platná sada Pexesooo.",
    badFolder:"Ve vybrané složce nejsou žádné platné sady Pexesooo.",
    loadingFolder:"Čtení složky…",
    repo:"Zobrazit na GitHubu" }
};
let lang = "cs";
const L = () => STR[lang];
function txt(id,key){ const e=document.getElementById(id); if(e) e.textContent=L()[key]; }
function applyLang(){
  txt("t-title","title"); txt("t-subtitle","subtitle"); txt("t-settings","settings");
  txt("t-setlabel","setlabel"); txt("t-pick","pick"); txt("t-pickfolder","pickFolder");
  txt("t-players","players"); txt("t-names","names");

/* ---------------- security: validation limits ---------------- */
/* SECURITY: cap pair count and per-image src size to prevent memory DoS. */
const MAX_PAIRS = 500;
const MAX_SRC_BYTES = 3 * 1024 * 1024; // 3 MB per image src (base64 ~4/3 of raw)

/* ---------------- helpers ---------------- */
/* SECURITY: sideValid enforces data:image prefix and per-src size cap to prevent DoS. */
function sideValidImage(s){
  if (!s || s.kind !== "image") return false;
  if (typeof s.src !== "string") return false;
  if (!s.src.startsWith("data:image")) return false;
  if (s.src.length > MAX_SRC_BYTES) return false;
  return true;
}
function validSet(d){
  if (!d || d.format !== "pexesooo" || !Array.isArray(d.pairs) || d.pairs.length < 2) return false;
  // SECURITY: cap total pairs to prevent memory DoS
  if (d.pairs.length > MAX_PAIRS) return false;
  return d.pairs.every(p => p && p.a && p.b && sideValidImage(p.a) && sideValidImage(p.b));
}
function escHtml(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

/* Format ISO timestamp as "yyyy-mm-dd HH:mm" (language-neutral, per spec). */
function fmtCreatedAt(iso){
  if (!iso) return "";
  try {
    const d = new Date(iso);
    const yyyy = d.getUTCFullYear();
    const mm   = String(d.getUTCMonth()+1).padStart(2,"0");
    const dd   = String(d.getUTCDate()).padStart(2,"0");
    const HH   = String(d.getUTCHours()).padStart(2,"0");
    const MM   = String(d.getUTCMinutes()).padStart(2,"0");
    return `${yyyy}-${mm}-${dd} ${HH}:${MM}`;
  } catch(e){ return ""; }
}

/* Build the single-line set meta: "<n> pairs, <yyyy-mm-dd HH:mm>, <size> px".
   Timestamp and thumb.size are appended only when present, so older sets that
   lack either field degrade gracefully (comma-separated, no empty segments). */
function fmtSetMeta(d){
  const parts = [ (d.pairCount || d.pairs.length) + " " + L().pairs ];
  const dateStr = fmtCreatedAt(d.createdAt);
  if (dateStr) parts.push(dateStr);
  if (d.thumb && d.thumb.size) parts.push(d.thumb.size + " px");
  return parts.join(", ");
}

/* Reset both pickers to unloaded visual state. */
function resetPickers(){
  document.getElementById("pickerFile").classList.remove("loaded");
  document.getElementById("pickerFolder").classList.remove("loaded");
  document.getElementById("pmetaFile").textContent = L().noFile;
  document.getElementById("pmetaFolder").textContent = L().noFolder;
}

/* Clear set selection and all derived UI. */
function clearSet(){
  setData = null; folderSets = []; isFolderMode = false;
  document.getElementById("previewHost").innerHTML = "";
  gate();
}

/* SECURITY: safe image element factory — assigns src via DOM property, never innerHTML.
   This prevents attribute injection (e.g. onerror= handlers) regardless of src content. */
function makeSafeImg(src, cls, alt){
  const img = document.createElement("img");
  if (cls) img.className = cls;
  if (alt !== undefined) img.alt = alt;
  img.src = src; // DOM property assignment; browser never parses this as HTML
  return img;
}

/* ---------------- file picker (single JSON) ---------------- */
const fileIn = document.getElementById("fileIn");
fileIn.addEventListener("change", async ()=>{
  const f = fileIn.files[0]; if(!f) return;
  clearSet();
  resetPickers();
  isFolderMode = false;
  document.getElementById("previewHost").innerHTML = "";
  try {
    const data = JSON.parse(await f.text());
    if (!validSet(data)) throw new Error("invalid");
    if (data.back && !sideValidImage(data.back)) delete data.back;
    setData = data;
    document.getElementById("pmetaFile").textContent = f.name;
    document.getElementById("pickerFile").classList.add("loaded");
    renderPreview(setData);
  } catch(e){
    document.getElementById("previewHost").innerHTML = `<div class="error-banner">${L().badFile}</div>`;
  }
  gate();
});

/* ---------------- folder picker ---------------- */
const folderIn = document.getElementById("folderIn");
folderIn.addEventListener("change", async ()=>{
  const files = folderIn.files; if(!files || !files.length) return;
  clearSet();
  resetPickers();
  isFolderMode = true;

  // Determine top-level folder name for the meta label (use first file's path prefix)
  const firstPath = files[0].webkitRelativePath || files[0].name;
  const folderName = firstPath.includes("/") ? firstPath.split("/")[0] : "folder";
  document.getElementById("pmetaFolder").textContent = folderName;
  document.getElementById("pickerFolder").classList.add("loaded");

  // Show loading indicator
  document.getElementById("previewHost").innerHTML = `<div class="loading-msg">${L().loadingFolder}</div>`;

  // Filter to top-level JSON files only (no recursion: path must have exactly one "/" separator)
  const jsonFiles = Array.from(files).filter(f => {
    const rel = f.webkitRelativePath || f.name;
    const parts = rel.split("/");
    return parts.length === 2 && parts[1].toLowerCase().endsWith(".json");
  });

  // Parse all JSON files; keep valid sets, discard invalid silently
  const valid = [];
  for (const f of jsonFiles){
    try {
      const data = JSON.parse(await f.text());
      if (!validSet(data)) continue;
      if (data.back && !sideValidImage(data.back)) delete data.back;
      valid.push(data);
    } catch(e){ /* silently skip */ }
  }

  if (valid.length === 0){
    document.getElementById("previewHost").innerHTML = `<div class="error-banner">${L().badFolder}</div>`;
    gate(); return;
  }

  // Sort by name alphabetically for a stable, predictable order
  valid.sort((a,b) => (a.name||"").localeCompare(b.name||""));
  folderSets = valid;
  renderFolderList();
  gate();
});

/* ---------------- folder set list rendering ---------------- */
/* SECURITY: builds DOM nodes directly rather than via innerHTML for any user-data-derived content. */
function renderFolderList(){
  const host = document.getElementById("previewHost");
  host.innerHTML = "";
  const list = document.createElement("div");
  list.className = "set-list";

  folderSets.forEach((d, idx) => {
    const row = document.createElement("div");
    row.className = "preview rise" + (d === setData ? " selected" : "");
    row.style.animationDelay = (idx * 32) + "ms";

    const main = document.createElement("div");
    main.className = "preview-main";

    const nameEl = document.createElement("div");
    nameEl.className = "pname";
    nameEl.textContent = d.name || "Untitled set";
    main.appendChild(nameEl);

    if (d.description){
      const descEl = document.createElement("div");
      descEl.className = "pdesc";
      descEl.textContent = d.description;
      main.appendChild(descEl);
    }

    // Single-line meta: pairs, timestamp, resolution (thumb.size)
    const metaEl = document.createElement("div");
    metaEl.className = "pcount";
    metaEl.textContent = fmtSetMeta(d);
    main.appendChild(metaEl);

    row.appendChild(main);

    // SECURITY: back image uses makeSafeImg (DOM property assignment)
    if (d.back && d.back.kind === "image"){
      const backDiv = document.createElement("div");
      backDiv.className = "preview-back";
      backDiv.appendChild(makeSafeImg(d.back.src, null, ""));
      row.appendChild(backDiv);
    }

    row.addEventListener("click", () => {
      setData = d;
      list.querySelectorAll(".preview").forEach(r => r.classList.remove("selected"));
      row.classList.add("selected");
      gate();
    });

    list.appendChild(row);
  });

  host.appendChild(list);
}

/* ================= GAME ENGINE ================= */
let state = null;
document.getElementById("startBtn").addEventListener("click", ()=>{ rotationIndex = 0; startGame(); });

/* ---------------- pair preview ---------------- */
/* Shows every pair of the selected set in the Game area: each pair's two cards side by side on a
   uniting surface (an enlarged version of the end-of-game won-pair display), with the pair's file
   name (id) below. Settings stays open, so Start game remains one click away.
   SECURITY: images assigned via makeSafeImg (DOM property); the id label via textContent. */
function renderPreviewPairs(){
  const host = document.getElementById("previewPairs");
  host.innerHTML = "";
  setData.pairs.forEach((p, idx) => {

function showPreview(){

  // Use the Game area for the preview: show the pairs, hide the live-game elements.

document.getElementById("replayBtn").addEventListener("click", ()=>{

let rotationIndex = 0;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startGame(){
  const players = nameInputs.map(inp=>({ name:inp.value.trim(), score:0, won:[], turns:0 }));
  const cards = [];
  setData.pairs.forEach((p,idx)=>{ cards.push({pid:idx, side:p.a}); cards.push({pid:idx, side:p.b}); });
  shuffle(cards); cards.forEach((c,i)=>{ c.i=i; c.won=false; c.up=false; });

  const useTimer = timerToggle.classList.contains("on");
  const secs = Math.max(3, Math.min(120, parseInt(document.getElementById("timerSecs").value,10)||15));

  state = { players, cards, cur: rotationIndex % players.length, flipped:[], lock:false, awaitEnd:false,
    pairsLeft:setData.pairs.length, liveScore:scoreToggle.classList.contains("on"),
    useTimer, secs, timerId:null, timeLeft:secs, startTime:Date.now() };

  const total = cards.length;
  let cols = Math.round(Math.sqrt(total*1.6));
  cols = Math.max(3, Math.min(8, cols));
  if (window.innerWidth < 560) cols = Math.min(cols, 4);
  document.getElementById("board").style.gridTemplateColumns = `repeat(${cols},1fr)`;

  // Restore the live-game view in case a preview was showing.
  document.getElementById("previewPairs").classList.add("hidden");
  document.getElementById("players").classList.remove("hidden");
  document.getElementById("board").classList.remove("hidden");

  renderBoard(); renderPlayers();
  document.getElementById("timerWrap").classList.toggle("hidden", !useTimer);

  setCollapsed("settingsCard", true); setCollapsed("resultCard", true); setCollapsed("gameCard", false);
  document.getElementById("gameCard").scrollIntoView({behavior:"smooth"});
  beginTurn();
}

/* SECURITY: builds back face via DOM to avoid innerHTML with set-data-derived image src. */
function makeBackFace(){
  const face = document.createElement("div");
  face.className = "card-face face-back";
  if (setData.back && setData.back.kind === "image"){
    face.appendChild(makeSafeImg(setData.back.src, null, ""));
  } else {
    const nameDiv = document.createElement("div");
    nameDiv.className = "backname";
    nameDiv.textContent = setData.name || "Pexesooo";
    face.appendChild(nameDiv);
  }
  return face;
}

/* SECURITY: renderBoard builds all card DOM via createElement + makeSafeImg.
   No card image src is ever interpolated into innerHTML. */
function renderBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  state.cards.forEach(c => {
    const slot = document.createElement("div");
    slot.className = "slot rise" + (c.won ? " won" : "");
    slot.style.animationDelay = (c.i * 18) + "ms";

    const card3d = document.createElement("div");
    card3d.className = "card3d" + (c.up ? " up" : "");
    card3d.dataset.i = c.i;

    // Back face
    card3d.appendChild(makeBackFace());

    // Front face — SECURITY: image assigned via makeSafeImg
    const front = document.createElement("div");
    front.className = "card-face face-front";
    front.appendChild(makeSafeImg(c.side.src, null, ""));
    card3d.appendChild(front);

    card3d.addEventListener("click", () => onFlip(+card3d.dataset.i));
    slot.appendChild(card3d);
    board.appendChild(slot);
  });
}

function cardEl(i){ return document.querySelector(`.card3d[data-i="${i}"]`); }

function renderPlayers(){
  if (!state) return;
  const host = document.getElementById("players"); host.innerHTML = "";
  state.players.forEach((p,idx)=>{
    const active = idx===state.cur, endable = active && state.awaitEnd;
    const tok = document.createElement("div");
    tok.className = "ptoken" + (active?" active":"") + (endable?" endable":"");

    const nameSpan = document.createElement("span");
    nameSpan.className = "pn";
    nameSpan.textContent = p.name;
    tok.appendChild(nameSpan);

    if (state.liveScore){
      const scoreSpan = document.createElement("span");
      scoreSpan.className = "ps";
      scoreSpan.textContent = p.score;
      tok.appendChild(scoreSpan);
    }
    if (endable){
      const hint = document.createElement("span");
      hint.className = "end-hint";
      hint.textContent = "· " + L().endTurn;
      tok.appendChild(hint);
    }
    if (endable) tok.addEventListener("click", endTurn);
    host.appendChild(tok);
  });
}

function beginTurn(){
  state.flipped=[]; state.awaitEnd=false; state.lock=false;
  document.getElementById("board").classList.remove("locked");
  renderPlayers();
  if (state.useTimer) startTimer();
}
function startTimer(){
  stopTimer(); state.timeLeft = state.secs; updateTimerUI();
  state.timerId = setInterval(()=>{
    state.timeLeft -= 0.1;
    if (state.timeLeft<=0){ state.timeLeft=0; updateTimerUI(); stopTimer(); onTimeout(); }
    else updateTimerUI();
  }, 100);
}
function stopTimer(){ if (state.timerId){ clearInterval(state.timerId); state.timerId=null; } }
function updateTimerUI(){
  const pct = Math.max(0,(state.timeLeft/state.secs)*100);
  const fill = document.getElementById("timerFill");
  fill.style.width = pct+"%";
  fill.classList.toggle("low", state.timeLeft <= state.secs*0.25);
  document.getElementById("timerNum").textContent = Math.ceil(state.timeLeft)+"s";
}
function onTimeout(){
  state.players[state.cur].turns += 1;
  state.flipped.forEach(i=>{ state.cards[i].up=false; const el=cardEl(i); if(el) el.classList.remove("up","nomatch"); });
  state.flipped=[]; state.awaitEnd=false; advance();
}

function onFlip(i){
  if (!state || state.lock || state.awaitEnd) return;
  const c = state.cards[i];
  if (c.won || c.up || state.flipped.length>=2) return;
  c.up = true; cardEl(i).classList.add("up"); state.flipped.push(i);
  if (state.flipped.length===2){
    state.lock = true; stopTimer();
    document.getElementById("board").classList.add("locked");
    const [a,b] = state.flipped;
    const match = state.cards[a].pid === state.cards[b].pid;
    if (match) setTimeout(()=>resolveMatch(a,b), 420);
    else setTimeout(()=>resolveNoMatch(a,b), 220);
  }
}
function resolveMatch(a,b){
  cardEl(a).classList.add("matched"); cardEl(b).classList.add("matched");
  const p = state.players[state.cur];
  p.score += 1; p.won.push({ a:state.cards[a].side, b:state.cards[b].side });
  state.pairsLeft -= 1;
  setTimeout(()=>{
    [a,b].forEach(i=>{ state.cards[i].won=true; cardEl(i).closest(".slot").classList.add("won"); });
    if (state.pairsLeft===0){ state.players[state.cur].turns += 1; finishGame(); return; }
    state.flipped=[]; state.lock=false; state.awaitEnd=false;
    document.getElementById("board").classList.remove("locked");
    if (state.liveScore) renderPlayers();
    if (state.useTimer) startTimer();
  }, 520);
}
function resolveNoMatch(a,b){
  cardEl(a).classList.add("nomatch"); cardEl(b).classList.add("nomatch");
  state.awaitEnd = true; renderPlayers();
  if (state.useTimer) startTimer();
}
function endTurn(){
  if (!state.awaitEnd) return;
  state.players[state.cur].turns += 1;
  stopTimer();
  state.flipped.forEach(i=>{ state.cards[i].up=false; const el=cardEl(i); el.classList.remove("up","nomatch"); });
  state.flipped=[]; state.awaitEnd=false; advance();
}
function advance(){ state.cur = (state.cur+1) % state.players.length; beginTurn(); }

function fmtTime(ms){ const s=Math.round(ms/1000), m=Math.floor(s/60), r=s%60; return m+":"+String(r).padStart(2,"0"); }

/* SECURITY: finishGame builds all result DOM via createElement + makeSafeImg.
   Won-pair thumbnails use DOM property assignment, not innerHTML. */
function finishGame(){
  stopTimer();
  document.getElementById("resTime").textContent = fmtTime(Date.now()-state.startTime);
  const players = state.players;
  const max = Math.max(...players.map(p=>p.score));
  const ranked = [...players].sort((x,y)=>y.score-x.score);
  const host = document.getElementById("resultLines");
  host.innerHTML = "";
  ranked.forEach((p, idx) => {
    const isWin = p.score === max && players.length > 1;
    const line = document.createElement("div");
    line.className = "result-line rise";
    line.style.animationDelay = (idx * 40) + "ms";

    const left = document.createElement("div");
    left.style.flex = "1";

    const rname = document.createElement("div");
    rname.className = "rname";
    if (isWin){ const crown = document.createElement("span"); crown.className = "crown"; crown.textContent = "🏆"; rname.appendChild(crown); }
    rname.appendChild(document.createTextNode(p.name));
    left.appendChild(rname);

    const rmeta = document.createElement("div");
    rmeta.className = "rmeta";
    rmeta.textContent = L().turns + ": " + p.turns;
    left.appendChild(rmeta);

    if (p.won.length){
      const wonCards = document.createElement("div");
      wonCards.className = "won-cards";
      p.won.forEach(w => {
        const pair = document.createElement("div");
        pair.className = "won-pair";
        // SECURITY: won-pair thumbnails use makeSafeImg
        pair.appendChild(makeSafeImg(w.a.src, "mini", ""));
        pair.appendChild(makeSafeImg(w.b.src, "mini", ""));
        wonCards.appendChild(pair);
      });
      left.appendChild(wonCards);
    }

    line.appendChild(left);

    const rscore = document.createElement("div");
    rscore.className = "rscore";
    rscore.textContent = p.score;
    line.appendChild(rscore);

    host.appendChild(line);
  });
  setCollapsed("gameCard", true); setCollapsed("resultCard", false);
  document.getElementById("resultCard").scrollIntoView({behavior:"smooth"});
}

applyLang(); gate();
</script>
</body>
</html>
